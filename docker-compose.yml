services:
  go-shelf:
    build: .
    restart: unless-stopped
    ports:
      - "${PORT:-3001}:${PORT:-3001}"
    volumes:
      # Database and auth tokens (keep this on a persistent volume)
      - ./data:/app/data
      # Where installers are saved — change the left side to your NAS/drive path
      - /mnt/reflect/gog-shelf:/downloads
    environment:
      PORT: ${PORT:-3001}
      DOWNLOAD_DIR: /downloads
      HOST: ${HOST:-http://localhost:3001}
