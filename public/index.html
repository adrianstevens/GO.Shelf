<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GO Shelf</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f0f13;
      --surface:  #1a1a24;
      --card:     #222230;
      --border:   #2e2e40;
      --accent:   #7b68ee;
      --accent2:  #e94560;
      --text:     #e0e0e0;
      --muted:    #888;
      --radius:   8px;
    }

    body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; min-height: 100vh; }

    /* Header */
    header {
      display: flex; align-items: center; gap: 1rem;
      padding: .75rem 1.5rem;
      background: var(--surface); border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 100;
    }
    header h1 { font-size: 1.2rem; font-weight: 700; color: var(--accent); flex: 1; }
    header h1 span { color: var(--accent2); }
    #search, #sort-select, #cat-filter, #dl-filter {
      padding: .4rem .75rem; border-radius: var(--radius);
      border: 1px solid var(--border); background: var(--card);
      color: var(--text); font-size: .9rem;
    }
    #search { width: 220px; }
    #sort-select, #cat-filter, #dl-filter { cursor: pointer; }
    #search:focus, #sort-select:focus, #cat-filter:focus, #dl-filter:focus { outline: none; border-color: var(--accent); }
    .btn {
      padding: .4rem .9rem; border-radius: var(--radius); border: none;
      font-size: .85rem; font-family: inherit; cursor: pointer; font-weight: 600; transition: opacity .15s;
    }
    .btn:hover { opacity: .85; }
    a.btn { text-decoration: none; }
    .btn-primary  { background: var(--accent); color: #fff; }
    .btn-success  { background: #4caf50; color: #fff; }
    .btn-danger   { background: var(--accent2); color: #fff; }
    .btn-outline  { background: transparent; border: 1px solid var(--border); color: var(--text); }
    #queue-toggle { position: relative; }
    #queue-badge {
      position: absolute; top: -6px; right: -6px;
      background: var(--accent2); color: #fff;
      border-radius: 999px; font-size: .65rem; padding: 1px 5px;
      display: none;
    }

    /* Stats bar */
    #stats-bar {
      display: flex; align-items: center; gap: 1.5rem; flex-wrap: wrap;
      padding: .75rem 1.5rem; background: var(--surface);
      border-bottom: 1px solid var(--border); font-size: .85rem;
      position: sticky; top: var(--header-h, 53px); z-index: 90;
    }
    .stat { display: flex; flex-direction: column; gap: 2px; }
    .stat-label { font-size: .7rem; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); }
    .stat-value { font-weight: 700; color: var(--text); }
    #scan-progress-wrap { flex: 1; min-width: 200px; }
    #scan-progress-bar  { height: 4px; background: var(--border); border-radius: 2px; margin-top: 4px; overflow: hidden; }
    #scan-progress-fill { height: 100%; background: var(--accent); transition: width .3s; width: 0%; }
    #scan-status { font-size: .75rem; color: var(--muted); }

    /* Login screen */
    #login-screen {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 80vh; gap: 1rem; text-align: center;
    }
    #login-screen h2 { font-size: 1.5rem; }
    #login-screen p  { color: var(--muted); max-width: 360px; }
    #login-screen a  { font-size: 1.1rem; padding: .6rem 1.4rem; }

    /* Library */
    #library-screen { padding: 1.5rem; }
    #library-meta { color: var(--muted); font-size: .85rem; margin-bottom: 1rem; }

    #game-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 1rem;
    }
    .game-card {
      background: var(--card); border-radius: var(--radius);
      border: 1px solid var(--border); cursor: pointer;
      transition: border-color .15s, transform .1s;
      overflow: hidden;
    }
    .game-card:hover { border-color: var(--accent); transform: translateY(-2px); }
    .game-card img  { width: 100%; aspect-ratio: 196/110; object-fit: cover; display: block; }
    .game-card-title {
      padding: .5rem .6rem .25rem; font-size: .8rem; font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .game-card-size {
      padding: 0 .6rem .5rem; font-size: .7rem; color: var(--muted);
    }
    .game-card.downloaded { border-color: rgba(76,175,80,.5); }
    .game-card.downloaded .game-card-size { color: #4caf50; }
    .game-card.queued      { border-color: rgba(123,104,238,.4); }
    .game-card.downloading { border-color: var(--accent); }
    .game-card.failed      { border-color: rgba(233,69,96,.4); }
    .game-card.has-update  { border-color: rgba(240,165,0,.6); }
    .update-tag  { color: #f0a500; font-weight: 700; }
    .status-update { color: #f0a500; }
    .card-progress { height: 3px; background: var(--border); border-radius: 0 0 var(--radius) var(--radius); overflow: hidden; }
    .card-progress-fill { height: 100%; width: 0%; transition: width .4s; background: var(--accent); }
    .game-card.queued .card-progress-fill { width: 100%; background: rgba(123,104,238,.35); }
    .game-card.failed .card-progress-fill { width: 100%; background: var(--accent2); }
    .status-queued     { color: var(--accent); }
    .status-failed     { color: var(--accent2); }

    /* Normalize all header controls to match the input feel */
    header .btn { font-size: .9rem; font-weight: 400; padding: .4rem .75rem; }

    /* View toggle */
    .view-toggle { display: flex; gap: 2px; }
    .view-btn {
      padding: .4rem .6rem; border-radius: var(--radius); border: 1px solid var(--border);
      background: transparent; color: var(--muted); cursor: pointer;
      font-size: .9rem; font-family: inherit; font-weight: 400; line-height: 1;
    }
    .view-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* List view */
    #game-list { padding: 0 1.5rem 1.5rem; }
    .list-header, .list-row {
      display: grid;
      grid-template-columns: 68px 1fr 56px 120px 88px 42px;
      align-items: center;
      gap: .75rem;
      padding: .35rem .6rem;
      border-radius: var(--radius);
    }
    .list-header {
      font-size: .7rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .07em; color: var(--muted);
      border-bottom: 1px solid var(--border);
      border-radius: 0; position: sticky; top: var(--list-top, 110px);
      background: var(--bg); z-index: 10; padding-bottom: .5rem; margin-bottom: .15rem;
    }
    .list-header .sortable { cursor: pointer; user-select: none; display: flex; align-items: center; gap: .3rem; }
    .list-header .sortable:hover { color: var(--text); }
    .list-header .sortable.active { color: var(--accent); }
    .list-row { cursor: pointer; transition: background .1s; }
    .list-row:hover { background: var(--card); }
    .list-thumb { width: 64px; height: 36px; object-fit: cover; border-radius: 3px; display: block; background: var(--card); }
    .list-title { font-size: .85rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .list-year, .list-cat { font-size: .8rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .list-size { font-size: .8rem; text-align: right; font-variant-numeric: tabular-nums; }
    .list-size.downloaded { color: #4caf50; }
    .list-action { display: flex; justify-content: flex-end; }

    /* Modal */
    .overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.7);
      display: flex; align-items: center; justify-content: center;
      z-index: 200; padding: 1rem;
    }
    .modal {
      background: var(--surface); border-radius: var(--radius);
      border: 1px solid var(--border); width: 100%; max-width: 640px;
      max-height: 90vh; display: flex; flex-direction: column;
    }
    .modal-header {
      display: flex; align-items: flex-start; gap: 1rem;
      padding: 1.25rem; border-bottom: 1px solid var(--border);
    }
    .modal-cover { width: 120px; border-radius: 4px; flex-shrink: 0; }
    .modal-info  { flex: 1; }
    .modal-info h2 { font-size: 1.1rem; margin-bottom: .5rem; }
    .modal-close { background: none; border: none; color: var(--muted); font-size: 1.4rem; cursor: pointer; line-height: 1; }
    .modal-close:hover { color: var(--text); }

    /* Platform tabs */
    .platform-tabs { display: flex; gap: .5rem; margin-top: .75rem; flex-wrap: wrap; }
    .tab {
      padding: .25rem .65rem; border-radius: 999px; border: 1px solid var(--border);
      font-size: .8rem; cursor: pointer; background: transparent; color: var(--muted);
    }
    .tab.active { border-color: var(--accent); color: var(--accent); background: rgba(123,104,238,.12); }

    .modal-body { flex: 1; overflow-y: auto; padding: 1.25rem; }

    /* Download sections */
    .section-title {
      font-size: .75rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .08em; color: var(--muted); margin: 1rem 0 .5rem;
    }
    .section-title:first-child { margin-top: 0; }
    .dl-item {
      display: flex; align-items: center; gap: .75rem;
      padding: .5rem .75rem; border-radius: var(--radius);
      background: var(--card); border: 1px solid var(--border);
      margin-bottom: .4rem;
    }
    .dl-item-info { flex: 1; min-width: 0; }
    .dl-item-name { font-size: .85rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .dl-item-meta { font-size: .75rem; color: var(--muted); margin-top: 2px; }
    .dl-item .btn { flex-shrink: 0; font-size: .75rem; padding: .3rem .65rem; }
    .dl-item .btn.queued { opacity: .5; cursor: default; }

    .empty-state { color: var(--muted); font-size: .9rem; text-align: center; padding: 1.5rem; }

    /* Queue panel */
    #queue-panel {
      position: fixed; right: 0; top: 0; bottom: 0; width: 360px;
      background: var(--surface); border-left: 1px solid var(--border);
      display: flex; flex-direction: column; z-index: 150;
      transform: translateX(100%); transition: transform .25s;
    }
    #queue-panel.open { transform: translateX(0); }
    .queue-header {
      display: flex; align-items: center; padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
    }
    .queue-header h3 { flex: 1; font-size: 1rem; }
    .queue-list { flex: 1; overflow-y: auto; padding: .75rem; }
    .queue-item {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: .65rem .75rem; margin-bottom: .5rem;
    }
    .queue-item-header { display: flex; align-items: center; gap: .5rem; margin-bottom: .4rem; }
    .queue-item-title { font-size: .8rem; font-weight: 600; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .queue-item-delete { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1rem; line-height: 1; }
    .queue-item-delete:hover { color: var(--accent2); }
    .queue-item-file { font-size: .72rem; color: var(--muted); margin-bottom: .4rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .progress-bar { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--accent); transition: width .3s; }
    .queue-item-footer { display: flex; align-items: center; gap: .5rem; margin-top: .3rem; }
    .queue-item-status { font-size: .72rem; color: var(--muted); flex: 1; }
    .status-completed { color: #4caf50; }
    .status-failed    { color: var(--accent2); }
    .status-downloading { color: var(--accent); }
    .verified-ok      { color: #4caf50; }
    .verified-fail    { color: var(--accent2); }
    .verified-missing { color: var(--accent2); }
    .btn-outline.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  </style>
</head>
<body>

<header>
  <h1>GO <span>Shelf</span></h1>
  <input type="search" id="search" placeholder="Search games…" />
  <select id="cat-filter" style="display:none">
    <option value="">All categories</option>
  </select>
  <select id="dl-filter" style="display:none">
    <option value="all">All games</option>
    <option value="yes">Downloaded</option>
    <option value="no">Not downloaded</option>
  </select>
  <div class="view-toggle" style="display:none" id="platform-toggle">
    <button class="view-btn active" id="plat-windows">Windows</button>
    <button class="view-btn" id="plat-linux">Linux</button>
    <button class="view-btn" id="plat-mac">Mac</button>
  </div>
  <div class="view-toggle" style="display:none" id="view-toggle">
    <button class="view-btn active" id="view-grid" title="Card view">⊞</button>
    <button class="view-btn" id="view-list" title="List view">☰</button>
  </div>
  <select id="sort-select" style="display:none">
    <option value="name-asc">Name A→Z</option>
    <option value="name-desc">Name Z→A</option>
    <option value="year-desc">Newest first</option>
    <option value="year-asc">Oldest first</option>
    <option value="size-desc">Largest first</option>
    <option value="size-asc">Smallest first</option>
  </select>
  <button class="btn btn-outline" id="refresh-btn" style="display:none">Refresh</button>
  <button class="btn btn-outline" id="logout-btn" style="display:none">Logout</button>
  <button class="btn btn-outline" id="queue-toggle" style="display:none">
    Queue
    <span id="queue-badge">0</span>
  </button>
</header>

<main>
  <div id="login-screen" style="display:none">
    <h2>Connect your GOG account</h2>
    <p>Click below to sign in. After logging in, GOG will redirect you to a page — copy the full URL from your browser's address bar and paste it here.</p>
    <a href="/auth/login" class="btn btn-primary" target="_blank" id="login-link">Sign in with GOG</a>
    <div id="paste-step" style="display:none; margin-top:1.5rem; width:100%; max-width:480px;">
      <p style="margin-bottom:.5rem; font-size:.9rem; color:var(--muted)">Paste the redirect URL here:</p>
      <div style="display:flex; gap:.5rem;">
        <input id="redirect-url" type="text" placeholder="https://embed.gog.com/on_login_success?origin=client&code=…"
          style="flex:1; padding:.5rem .75rem; border-radius:var(--radius); border:1px solid var(--border); background:var(--card); color:var(--text); font-size:.85rem;" />
        <button class="btn btn-primary" id="submit-code">Connect</button>
      </div>
      <p id="auth-error" style="color:var(--accent2); font-size:.8rem; margin-top:.5rem; display:none"></p>
    </div>
  </div>

  <div id="library-screen" style="display:none">
    <div id="stats-bar">
      <div class="stat">
        <span class="stat-label">Games</span>
        <span class="stat-value" id="stat-games">—</span>
      </div>
      <div class="stat">
        <span class="stat-label">Collection size</span>
        <span class="stat-value" id="stat-total-size">—</span>
      </div>
      <div class="stat">
        <span class="stat-label">Downloaded</span>
        <span class="stat-value" id="stat-downloaded">—</span>
      </div>
      <div id="scan-progress-wrap">
        <div style="display:flex; align-items:center; gap:.5rem;">
          <span id="scan-status">Not scanned</span>
          <button class="btn btn-outline" id="scan-btn" style="font-size:.75rem; padding:.25rem .6rem;">Scan Collection</button>
          <button class="btn btn-outline" id="update-btn" style="font-size:.75rem; padding:.25rem .6rem;">Check Updates</button>
        </div>
        <div id="scan-progress-bar"><div id="scan-progress-fill"></div></div>
      </div>
    </div>
    <div style="padding:1rem 1.5rem .5rem; color:var(--muted); font-size:.85rem;" id="library-meta"></div>
    <div style="padding:0 1.5rem 1.5rem"><div id="game-grid"></div></div>
    <div id="game-list" style="display:none"></div>
  </div>
</main>

<!-- Game detail modal (injected dynamically) -->

<!-- Queue panel -->
<div id="queue-panel">
  <div class="queue-header">
    <h3>Download Queue</h3>
    <button class="btn btn-outline" id="queue-close">✕</button>
  </div>
  <div class="queue-list" id="queue-list"></div>
</div>

<script src="app.js"></script>
</body>
</html>
